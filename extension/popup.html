<!DOCTYPE html>
<html>

<head>
  <style>
    body {
      width: 300px;
      padding: 16px;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background-color: #0f1629;
      color: white;
      margin: 0;
    }

    .header {
      display: flex;
      items-center;
      gap: 10px;
      margin-bottom: 20px;
    }

    .logo {
      width: 30px;
      height: 30px;
      background-color: #3b82f6;
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: bold;
      font-style: italic;
    }

    h1 {
      font-size: 18px;
      margin: 0;
      letter-spacing: -0.5px;
    }

    .input-group {
      margin-bottom: 16px;
    }

    label {
      display: block;
      font-size: 10px;
      font-weight: bold;
      color: #94a3b8;
      text-transform: uppercase;
      margin-bottom: 6px;
      letter-spacing: 1px;
    }

    input {
      width: 100%;
      padding: 10px;
      background: #1e293b;
      border: 1px solid #334155;
      border-radius: 8px;
      color: white;
      font-size: 14px;
      box-sizing: border-box;
      outline: none;
    }

    input:focus {
      border-color: #3b82f6;
    }

    button {
      width: 100%;
      padding: 10px;
      background: #3b82f6;
      border: none;
      border-radius: 8px;
      color: white;
      font-weight: bold;
      cursor: pointer;
      transition: background 0.2s;
    }

    button:hover {
      background: #2563eb;
    }

    .status {
      margin-top: 12px;
      font-size: 11px;
      text-align: center;
      color: #10b981;
      display: none;
    }
  </style>
</head>

<body>
  <div class="header">
    <div class="logo">V</div>
    <h1>VIGIL CONFIG</h1>
  </div>

  <div class="input-group">
    <label for="employeeId">Employee ID / Endpoint ID</label>
    <input type="text" id="employeeId" placeholder="e.g. emp-1 or X9-22">
  </div>

  <button id="saveBtn">SAVE CONFIGURATION</button>

  <div id="status" class="status">✓ Configuration saved</div>

  <script src="popup.js"></script>
</body>

</html>
